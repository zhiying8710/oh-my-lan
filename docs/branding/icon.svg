<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="t d">
  <title id="t">oh-my-lan</title>
  <desc id="d">Lowercase oml lettermark on black, three letters aligned to a single visual band; the o carries a small dot to suggest an endpoint device.</desc>

  <!-- 背景：纯黑圆角方（macOS Big Sur style, 22.37% radius） -->
  <rect width="1024" height="1024" rx="229" fill="#000"/>

  <!--
    Lettermark "oml" 几何参数（baseline 严格对齐版）：
    - visual band y ∈ [312, 712]，三字母 visual 高度都=400px
    - stroke 80, round cap, round join
    - o 圆心 (242, 512) 半径 160
    - m 三 stem 中心 x = 512 / 672 / 832；半圆弧拱顶在 y=352
    - l 中心线 x=942，y∈[352, 672]（无 ascender，与 m 同 band）
    - 整体水平居中：左右各 padding 42
  -->
  <g fill="none" stroke="#fff" stroke-width="80" stroke-linecap="round" stroke-linejoin="round">
    <!-- o -->
    <circle cx="242" cy="512" r="160"/>

    <!-- m -->
    <path d="M 512 672
             V 432
             A 80 80 0 0 1 672 432
             V 672
             M 672 432
             A 80 80 0 0 1 832 432
             V 672"/>

    <!-- l -->
    <line x1="942" y1="352" x2="942" y2="672"/>
  </g>

  <!-- o 中心节点（端点设备语义） -->
  <circle cx="242" cy="512" r="28" fill="#fff"/>
</svg>
