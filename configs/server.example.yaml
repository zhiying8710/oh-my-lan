# omlserver 配置示例
listen_addr: ":8080"                       # 控制平面 HTTP API
chisel_listen_addr: ":8443"                # chisel 隧道入口（设备 daemon 接入此端口）
chisel_advertise_addr: ""                  # 通告给客户端的 chisel 地址，如 "vps.example.com:8443"，空则用 listen
chisel_key_seed: ""                        # 可选；填一个长字符串可让 chisel server fingerprint 稳定
data_dir: "./data"

# 公网端口池，发布服务时从这个范围分配
port_pool:
  min: 40000
  max: 49999

log:
  level: "info"      # debug / info / warn / error
  format: "text"     # text / json
