# /etc/ssh/sshd_config.d/oml-hardening.conf
#
# 不动全局 sshd 配置（PasswordAuthentication / PermitRootLogin 等保持原样让你
# 仍能用 root 密码登录 emergency / 移动端 / 其它管理需要）。
# Match User oml-* 只对 oml 自管账号生效，强制 key-only + 限定 port-forward 范围。
#
# 部署：
#   cp scripts/deploy/oml-sshd-hardening.conf /etc/ssh/sshd_config.d/
#   sshd -t   # 校验语法
#   systemctl reload ssh

Match User oml-*
    PasswordAuthentication no
    KbdInteractiveAuthentication no
    PubkeyAuthentication yes
    PermitRootLogin no
    AllowAgentForwarding no
    AllowTcpForwarding yes
    PermitTTY no
    X11Forwarding no
    GatewayPorts no
    PermitOpen 127.0.0.1:40000 127.0.0.1:40001 127.0.0.1:40002 127.0.0.1:40003 127.0.0.1:40004 127.0.0.1:40005 127.0.0.1:40006 127.0.0.1:40007 127.0.0.1:40008 127.0.0.1:40009
    # 上面的 PermitOpen 是兜底范围，真正生效的是 authorized_keys 行里的 permitopen 列。
    # OpenSSH 不支持 PermitOpen 范围语法（不能写 40000-49999），列足够多兜底即可——
    # authorized_keys 才是 per-device per-service 的精确白名单。
    ForceCommand /bin/false
    ClientAliveInterval 60
    ClientAliveCountMax 3
