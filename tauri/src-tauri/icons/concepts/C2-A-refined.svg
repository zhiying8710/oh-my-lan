<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="t d">
  <title id="t">oh-my-lan — refined</title>
  <desc id="d">Lowercase oml lettermark in a single uniform stroke. Optical baseline aligned; tight kerning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="229" fill="url(#bg)"/>

  <!-- 字符整体居中：x-height 区间 [400, 720]，l 的 ascender 顶到 280 -->
  <g fill="none" stroke="#fff" stroke-width="80" stroke-linecap="round" stroke-linejoin="round">
    <!-- o：圆心 (250, 560)，半径 130（外缘 80~120, 410~720, 视觉上坐在 baseline=720） -->
    <circle cx="250" cy="560" r="130"/>

    <!-- m：x-height 320。左/中/右 stem 在 x = 410, 568, 726，stems 顶点都在 y=400 -->
    <path d="M 410 720
             L 410 480
             Q 410 400 489 400
             Q 568 400 568 480
             L 568 720
             M 568 480
             Q 568 400 647 400
             Q 726 400 726 480
             L 726 720"/>

    <!-- l：x=826，ascender 从 y=280 到 baseline=720 -->
    <line x1="826" y1="280" x2="826" y2="720"/>
  </g>
</svg>
