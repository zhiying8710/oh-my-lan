name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '版本号（如 v0.1.0），不打 git tag 也能手动跑'
        required: true
        default: 'v0.1.0-dev'

permissions:
  contents: write   # 用来创建 GitHub Release 上传产物

env:
  # 同一份 ldflags 让所有 job 写进版本号；tag push 时取 ref_name，手动跑时取 input
  VERSION: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # ──────────────────────────────────────────────────────
  # CLI 工具集：omlserver + omlctl 跨平台静态二进制。
  # 覆盖：Linux amd64/arm64（VPS + 树莓派），Windows amd64，macOS amd64/arm64。
  # Linux 只发 CLI 不发桌面——用户明确要求。
  # ──────────────────────────────────────────────────────
  cli:
    name: CLI ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
          - label: linux-arm64
            goos: linux
            goarch: arm64
            ext: ""
          - label: darwin-amd64
            goos: darwin
            goarch: amd64
            ext: ""
          - label: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ""
          - label: windows-amd64
            goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - name: Build omlserver + omlctl
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist staging
          LDFLAGS="-X github.com/zhiying8710/oh-my-lan/internal/version.Version=${VERSION}"
          go build -ldflags "$LDFLAGS" -o staging/omlserver${{ matrix.ext }} ./cmd/omlserver
          go build -ldflags "$LDFLAGS" -o staging/omlctl${{ matrix.ext }}   ./cmd/omlctl
          # Windows 习惯 .zip，Unix 用 .tar.gz——按平台打包让用户解压简单
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            ( cd staging && zip -9 "../dist/oh-my-lan-cli-${VERSION}-${{ matrix.label }}.zip" \
                omlserver.exe omlctl.exe )
          else
            ( cd staging && tar -czf "../dist/oh-my-lan-cli-${VERSION}-${{ matrix.label }}.tar.gz" \
                omlserver omlctl )
          fi
          ls -la dist/
      - uses: actions/upload-artifact@v5
        with:
          name: cli-${{ matrix.label }}
          path: dist/*

  # ──────────────────────────────────────────────────────
  # 桌面客户端：仅 macOS (universal DMG) + Windows (NSIS/MSI installer)。
  # Linux 不发桌面——用户用 omlctl + omlserver CLI 即可。
  # ──────────────────────────────────────────────────────
  desktop:
    name: Desktop ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (universal)
            os: macos-latest
            # universal-apple-darwin 是 cargo-tauri 的虚拟 "fat binary" 目标，不是 rustup 真实 target。
            # 给 rustup 装两个真实 target，cargo-tauri build --target universal-apple-darwin 会自动 lipo。
            rust-targets: x86_64-apple-darwin,aarch64-apple-darwin
            tauri-target: universal-apple-darwin
            tauri-bundles: dmg
            go-targets: |
              [
                {"os":"darwin","arch":"arm64","triple":"aarch64-apple-darwin","ext":""},
                {"os":"darwin","arch":"amd64","triple":"x86_64-apple-darwin","ext":""}
              ]
          - label: Windows (x86_64)
            os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-target: x86_64-pc-windows-msvc
            tauri-bundles: nsis,msi
            go-targets: |
              [
                {"os":"windows","arch":"amd64","triple":"x86_64-pc-windows-msvc","ext":".exe"}
              ]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      # Build sidecar omlctl(s)。每平台至少一份，macOS 两份让 cargo-tauri 自己 lipo 进 universal.
      # 历史教训：上一版用 cat <<EOF > /tmp/targets.json 然后 python on Windows 读不到
      # （git-bash 的 /tmp 是 MSYS2 映射，Python 不知道）。这一版把 JSON 写在仓库内相对路径，
      # 跨 shell / 跨 Python 解释器都能正确解析。
      - name: Build omlctl sidecars
        shell: bash
        run: |
          mkdir -p tauri/src-tauri/binaries
          # toJson + shell heredoc 写入仓库根的临时文件，避开 /tmp 跨平台坑
          cat > _go_targets.json <<'JSON_EOF'
          ${{ matrix.go-targets }}
          JSON_EOF
          cat _go_targets.json
          python <<'PY'
          import json, os, subprocess
          with open('_go_targets.json') as f:
              targets = json.load(f)
          for t in targets:
              env = os.environ.copy()
              env['GOOS'] = t['os']
              env['GOARCH'] = t['arch']
              env['CGO_ENABLED'] = '0'
              out = f"tauri/src-tauri/binaries/omlctl-{t['triple']}{t['ext']}"
              print(f"==> {out}")
              subprocess.check_call(['go', 'build', '-o', out, './cmd/omlctl'], env=env)
          PY
          rm -f _go_targets.json
          # macOS universal build：tauri.conf.json 声明的 sidecar 是 `binaries/omlctl`，
          # Tauri bundler 会按 --target 追加 triple 后缀去查找。`universal-apple-darwin`
          # 不是 rustup 真实 target，但 Tauri 仍然按 `omlctl-universal-apple-darwin` 找
          # sidecar。我们 cross-compile 只产 x86_64 + aarch64 两个独立二进制，
          # 这里用 lipo 把它们合成 fat binary，命名为 universal 即可被 bundler 找到。
          if [[ "${{ matrix.tauri-target }}" == "universal-apple-darwin" ]]; then
            BIN_DIR=tauri/src-tauri/binaries
            lipo -create \
              "$BIN_DIR/omlctl-x86_64-apple-darwin" \
              "$BIN_DIR/omlctl-aarch64-apple-darwin" \
              -output "$BIN_DIR/omlctl-universal-apple-darwin"
            chmod +x "$BIN_DIR/omlctl-universal-apple-darwin"
            echo "==> lipo'd universal:"
            file "$BIN_DIR/omlctl-universal-apple-darwin"
          fi
          ls -la tauri/src-tauri/binaries/

      - name: cargo install tauri-cli (cached)
        run: cargo install --locked tauri-cli --version '^2' || true

      - name: Sync web assets
        shell: bash
        run: |
          mkdir -p tauri/dist
          cp internal/server/web/index.html internal/server/web/style.css internal/server/web/app.js \
             internal/server/web/favicon.svg internal/server/web/favicon-32.png tauri/dist/

      - name: cargo tauri build
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            # macOS universal build 的奇怪行为：cargo-tauri --bundles dmg 完成后会
            # "Cleaning .../bundle/macos/oh-my-lan.app" 把 .app 当临时产物清掉。
            # 后续注入 ATS 找不到 .app。
            #
            # 解决：先跑 --bundles dmg（产 dmg + 拉 bundle_dmg.sh 助手 + 清 .app），
            # 再跑 --bundles app（不会触发清理，留下干净 .app 给我们注入）。
            # 两次 build 都走增量缓存，第二次几乎不耗时。
            cd tauri/src-tauri
            cargo tauri build --target ${{ matrix.tauri-target }} --bundles dmg
            cargo tauri build --target ${{ matrix.tauri-target }} --bundles app
          else
            cd tauri/src-tauri && cargo tauri build \
              --target ${{ matrix.tauri-target }} --bundles ${{ matrix.tauri-bundles }}
          fi

      - name: Inject ATS exception + repack DMG (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # 删 cargo-tauri 自动产的所有 DMG（上一步 --bundles dmg 留下的、未注入 ATS）。
          # 这样 Collect 阶段才不会把它们和我们手工 repack 的注入版一起收走。
          find tauri/src-tauri/target -path '*/bundle/dmg/*.dmg' -delete
          echo "==> cleared cargo-tauri auto DMGs"

          for app in $(find tauri/src-tauri/target -name 'oh-my-lan.app' -path '*/bundle/macos/*'); do
            triple=$(echo "$app" | sed -nE 's|.*/target/([^/]+)/release/.*|\1|p')
            [ -z "$triple" ] && triple="universal"

            # 1) 注入 ATS
            ./tauri/scripts/inject-ats.sh "$app"

            # 2) PlistBuddy 验证注入是否真的生效；没有就 hard-fail，不让坏 DMG 上 release
            if ! /usr/libexec/PlistBuddy -c "Print :NSAppTransportSecurity:NSAllowsArbitraryLoads" \
                 "$app/Contents/Info.plist" 2>/dev/null | grep -q true; then
              echo "##[error]ATS injection 失败：Info.plist 里读不到 NSAllowsArbitraryLoads=true"
              /usr/libexec/PlistBuddy -c "Print" "$app/Contents/Info.plist" || true
              exit 1
            fi
            echo "==> ATS 验证通过：$app/Contents/Info.plist"

            # 3) bundle_dmg.sh 从 staging dir 重打 DMG。bundle_dmg.sh 是 tauri-cli 第一次
            #    跑 --bundles dmg 时写到 target/.../bundle/dmg/ 的，在前一步已经拉好。
            script=$(find tauri/src-tauri/target -name 'bundle_dmg.sh' -path '*/bundle/dmg/*' | head -1)
            if [[ -z "$script" ]]; then
              echo "##[error]找不到 bundle_dmg.sh——上一步 --bundles dmg 没产出助手脚本"
              exit 1
            fi
            stage=$(mktemp -d)
            cp -a "$app" "$stage/"
            out_dir="$(dirname "$(dirname "$app")")/dmg"
            mkdir -p "$out_dir"
            out_dmg="$out_dir/oh-my-lan_${VERSION}_${triple}.dmg"
            rm -f "$out_dmg"
            bash "$script" \
              --volname "oh-my-lan" \
              --icon "oh-my-lan.app" 180 170 \
              --app-drop-link 480 170 \
              --window-pos 200 120 \
              --window-size 660 400 \
              --hide-extension "oh-my-lan.app" \
              --icon-size 128 \
              "$out_dmg" "$stage"
            rm -rf "$stage"
            echo "✓ $out_dmg"
          done

          # 兜底：上面 find 没匹配到任何 .app，fail loud
          if ! ls tauri/src-tauri/target/*/release/bundle/dmg/oh-my-lan_${VERSION}_*.dmg 2>/dev/null; then
            echo "##[error]No injected DMG produced; ATS will fail at runtime"
            exit 1
          fi

      - name: Collect bundles
        shell: bash
        run: |
          mkdir -p dist
          find tauri/src-tauri/target -path '*/release/bundle/*' \
            \( -name '*.dmg' -o -name '*.msi' -o -name '*-setup.exe' \) \
            -exec cp -v {} dist/ \;
          ls -la dist/

      - uses: actions/upload-artifact@v5
        with:
          name: desktop-${{ runner.os }}
          path: dist/*

  # ──────────────────────────────────────────────────────
  # 汇总：把所有产物附到 GitHub Release
  # ──────────────────────────────────────────────────────
  release:
    needs: [cli, desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v5
        with: { path: dist }
      - name: Flatten
        run: find dist -type f -print -exec mv {} dist/ \; 2>/dev/null; ls -la dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
